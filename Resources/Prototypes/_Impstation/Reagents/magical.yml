        conditions:      
        - !type:OrganType
          type: Plant
      - !type:ModifyBloodLevel
        amount: 2
        conditions:      
        - !type:OrganType
          type: Plant
    Poison:
      effects:
      - !type:HealthChange
        damage:
          groups:
            Brute: 2
            Burn: 2
            Airloss: 2
            Genetic: 2
            Toxin: 2
      - !type:ModifyBloodLevel
        amount: -2
      - !type:ModifyBleedAmount
        amount: 1